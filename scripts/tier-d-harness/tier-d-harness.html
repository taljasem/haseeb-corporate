    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&family=Noto+Sans+Arabic:wght@400;500;600&family=Bebas+Neue&display=swap" rel="stylesheet" />
    <title>Tier D Harness</title>
  </head>
  <body>
    <script>
      (function () {
        try {
          var t = localStorage.getItem("haseeb-corporate-theme");
          if (t !== "light" && t !== "dark") t = "dark";
          document.documentElement.setAttribute("data-theme", t);
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="./tier-d-harness.jsx"></script>
  </body>
</html>
